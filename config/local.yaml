env: "local"
storage_path: "./storage/storage.db"
http_server:
  address: "localhost:8080"
  read_timeout: 5s
  write_timeout: 30s
  idle_timeout: 60s
  cors:
    allowed_origins:
      - "http://localhost:5173"
      - "http://localhost:5174"
  session:
    TTL: 24h
    CookieName: "session_id"
    Secure: false
    SameSite: "lax"
