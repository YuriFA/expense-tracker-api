http_server:
  address: "0.0.0.0:8080"
  read_timeout: 5s
  write_timeout: 30s
  idle_timeout: 60s
  cors:
    allowed_origins:
      - "http://localhost:5173"
      - "http://localhost:5174"
  session:
    TTL: 24h
    cookie_name: "session_id"
    secure: true
    same_site: "lax"
    sliding_expiration: true
    cleanup_intercal: 6h
  login_rate_limit:
    max_attempts: 5
    lockout_duration: 15m
